<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1677FF"/>
      <stop offset="100%" stop-color="#0958D9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69B1FF"/>
      <stop offset="100%" stop-color="#1677FF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- "R" letter -->
  <text x="128" y="165" font-family="Inter, Arial, sans-serif" font-size="140" font-weight="800" fill="white" text-anchor="middle">R</text>
  <!-- AI sparkle dot -->
  <circle cx="195" cy="72" r="16" fill="#69B1FF" opacity="0.9"/>
  <circle cx="195" cy="72" r="8" fill="white"/>
</svg>
